<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tshirt.st スペック比較ツール（画像あり）</title>
<style>
  /* --- 基本設定 --- */
  :root {
    --primary-color: #005BAC;
    --text-color: #333;
    --border-color: #ccc;
    --bg-gray: #f9f9f9;
  }
  body {
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: var(--text-color);
    margin: 0;
    padding: 20px;
    background-color: #fff;
    font-size: 14px;
  }

  /* --- 検索エリア --- */
  .search-section {
    max-width: 600px;
    margin: 0 auto 30px;
    position: relative;
    text-align: center;
  }
  .search-box {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border: 2px solid var(--primary-color);
    border-radius: 4px;
    box-sizing: border-box;
  }
  .search-results {
    position: absolute;
    top: 100%; left: 0; right: 0;
    background: white;
    border: 1px solid #ccc;
    z-index: 100;
    max-height: 300px;
    overflow-y: auto;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    display: none;
    text-align: left;
  }
  .search-results.active { display: block; }
  .search-item {
    padding: 10px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .search-item:hover { background-color: #f0f8ff; }
  .add-btn-mini {
    background-color: var(--primary-color);
    color: white;
    border: none;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
  }

  /* --- 比較テーブルエリア --- */
  .comparison-container {
    max-width: 1000px;
    margin: 0 auto;
    overflow-x: auto;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    min-height: 200px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  
  .empty-state {
    padding: 50px;
    text-align: center;
    color: #888;
    background: var(--bg-gray);
  }

  table {
    width: 100%;
    min-width: 768px;
    border-collapse: collapse;
    table-layout: fixed;
  }
  th, td {
    border-bottom: 1px solid #eee;
    padding: 12px 10px;
    vertical-align: top;
  }
  
  th.label-col {
    width: 130px;
    background: #f4f4f4;
    font-weight: bold;
    color: #555;
    vertical-align: middle;
    font-size: 13px;
  }

  td.product-col {
    text-align: center;
    border-right: 1px solid #eee;
    width: 25%;
    background: #fff;
  }

  /* --- 商品画像スタイル (追加) --- */
  .product-img-container {
    height: 150px; /* 高さを揃える */
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
    background: #fff;
  }
  .product-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain; /* 枠内に綺麗に収める */
    border-radius: 4px;
  }

  /* --- UIパーツ --- */
  .product-code {
    font-size: 10px; color: #555; background: #e0e0e0; padding: 2px 6px; border-radius: 3px; display: inline-block; margin-bottom: 4px;
  }
  .remove-btn { font-size: 20px; color: #ccc; background: none; border: none; cursor: pointer; }
  .remove-btn:hover { color: #d32f2f; }
  .swatch { display: inline-block; width: 14px; height: 14px; border-radius: 50%; border: 1px solid #ddd; margin: 1px; }
  .gauge-wrap { display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 10px; color: #777; margin-top: 4px; }
  .gauge-bg { width: 50px; height: 5px; background: #ddd; border-radius: 3px; overflow: hidden; }
  .gauge-val { height: 100%; background: #666; }
  .spec-tag { display: inline-block; font-size: 11px; color: #005BAC; border: 1px solid #005BAC; padding: 2px 4px; border-radius: 3px; margin: 2px 0; }
  .spec-text { font-size: 13px; color: #333; }
  .spec-sub { font-size: 11px; color: #777; margin-top: 2px; }
  .cart-btn { background: var(--primary-color); color: #fff; border: none; padding: 10px; width: 90%; border-radius: 4px; cursor: pointer; font-weight: bold; }
  .cart-btn:hover { opacity: 0.9; }
</style>
</head>
<body>

  <div class="search-section">
    <h3>Tシャツ詳細スペック比較</h3>
    <input type="text" id="searchInput" class="search-box" placeholder="キーワード検索 (例: 5001, ドライ, 厚手)">
    <div id="searchResults" class="search-results"></div>
  </div>

  <div class="comparison-container">
    <div id="emptyState" class="empty-state" style="display:none;">
      現在比較している商品はありません。<br>品番やキーワードで検索して追加してください。
    </div>
    <table id="comparisonTable">
      </table>
  </div>

<script>
window.addEventListener('DOMContentLoaded', function() {

  // --- 商品データベース (imageプロパティを追加) ---
  // ※実際のサイトでは本物の商品画像URLを指定します。
  // ※ここではダミー画像サービス(placehold.co)を使用しています。
  const productDB = [
    { 
      id: 1, 
      code: "5001-01", 
      name: "5.6oz ハイクオリティーTシャツ", 
      // ダミー画像URL (白Tシャツを模倣)
      image: "https://placehold.co/200x250/ffffff/333333?text=5001-01+White",
      brand: "United Athle", 
      price: 1210, 
      colors: ["white", "black", "navy", "red", "gray", "green", "yellow"], 
      oz: 5.6, ozRate: 55, 
      mat: "綿100%", 
      sizes: "90cm 〜 XXXL",
      weave: "天竺 (ジャージー)", 
      yarn: "セミコーマ糸",
      neck: "ダブルステッチ",
      sil: "標準ボックス", 
      feat: "洗濯してもよれにくい / 超定番" 
    },
    { 
      id: 2, 
      code: "4252-01", 
      name: "7.1oz オープンエンド スーパーヘビーTシャツ", 
      // ダミー画像URL (ネイビーTシャツを模倣)
      image: "https://placehold.co/200x250/000080/ffffff?text=4252-01+Navy",
      brand: "United Athle", 
      price: 1870, 
      colors: ["white", "black", "navy", "gray"], 
      oz: 7.1, ozRate: 90, 
      mat: "綿100% (米綿)", 
      sizes: "S 〜 XXL",
      weave: "天竺",
      yarn: "オープンエンド糸", 
      neck: "バインダーネック", 
      sil: "ゆったり", 
      feat: "透けにくい / アメリカンな質感" 
    },
    { 
      id: 3, 
      code: "00300-ACT", 
      name: "4.4oz ドライTシャツ", 
      // ダミー画像URL (青ドライTシャツを模倣)
      image: "https://placehold.co/200x250/0000ff/ffffff?text=00300+Dry+Blue",
      brand: "glimmer", 
      price: 1100, 
      colors: ["white", "black", "blue", "pink", "orange", "purple", "lime"], 
      oz: 4.4, ozRate: 30, 
      mat: "ポリエステル100%", 
      sizes: "100cm 〜 7L", 
      weave: "メッシュ", 
      yarn: "ポリエステル糸",
      neck: "共生地(パイピング)",
      sil: "ややスリム", 
      feat: "吸汗速乾 / UVカット / 軽い" 
    },
    { 
      id: 4, 
      code: "5508-01", 
      name: "5.6oz ビッグシルエットTシャツ", 
      // ダミー画像URL (ベージュTシャツを模倣)
      image: "https://placehold.co/200x250/f5f5dc/333333?text=5508+Big+Beige",
      brand: "United Athle", 
      price: 2200, 
      colors: ["white", "black", "beige", "olive"], 
      oz: 5.6, ozRate: 55, 
      mat: "綿100%", 
      sizes: "S 〜 XL",
      weave: "天竺",
      yarn: "セミコーマ糸",
      neck: "ダブルステッチ",
      sil: "ビッグシルエット", 
      feat: "ドロップショルダー / トレンド" 
    }
  ];

  let compareList = [];
  const searchInput = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');
  const table = document.getElementById('comparisonTable');
  const emptyDiv = document.getElementById('emptyState');

  // --- 検索処理 ---
  searchInput.addEventListener('input', function(e) {
    const val = e.target.value.toLowerCase();
    searchResults.innerHTML = "";
    if (val.length === 0) { searchResults.classList.remove('active'); return; }
    const hits = productDB.filter(p => p.name.includes(val) || p.feat.includes(val) || p.code.toLowerCase().includes(val) || val === "tシャツ");
    if (hits.length > 0) {
      searchResults.classList.add('active');
      hits.forEach(p => {
        const div = document.createElement('div');
        div.className = 'search-item';
        // 検索結果にも小さな画像を表示
        div.innerHTML = `
          <div style="display:flex; align-items:center;">
            <img src="${p.image}" style="width:30px; height:30px; object-fit:cover; margin-right:8px; border-radius:4px;">
            <div>
              <span style="font-size:11px; color:#666; margin-right:5px;">${p.code}</span>
              <span style="font-weight:bold;">${p.name}</span>
            </div>
          </div>
          <button class="add-btn-mini">追加</button>`;
        div.addEventListener('click', function() { addItem(p.id); searchInput.value = ""; searchResults.classList.remove('active'); });
        searchResults.appendChild(div);
      });
    } else { searchResults.classList.remove('active'); }
  });

  // --- 追加・削除処理 ---
  function addItem(id) {
    if (compareList.find(item => item.id === id)) { alert("すでに追加されています"); return; }
    if (compareList.length >= 4) { alert("比較できるのは4つまでです"); return; }
    compareList.push(productDB.find(p => p.id === id));
    render();
  }
  window.removeItem = function(id) {
    compareList = compareList.filter(item => item.id !== id);
    render();
  };

  // --- 描画処理 (画像表示に対応) ---
  function render() {
    if (compareList.length === 0) { table.style.display = 'none'; emptyDiv.style.display = 'block'; return; }
    table.style.display = 'table'; emptyDiv.style.display = 'none';
    let h = "";

    // 1. 操作行
    h += "<thead><tr><th class='label-col'>操作</th>";
    compareList.forEach(p => h += `<td class='product-col'><button class='remove-btn' onclick='removeItem(${p.id})'>×</button></td>`);
    h += "</tr>";

    // 2. 基本情報 (ここに画像を追加)
    h += "<tr><th class='label-col'>基本情報</th>";
    compareList.forEach(p => {
      h += `<td class='product-col'>
              <div class="product-img-container">
                <img src="${p.image}" alt="${p.name}" class="product-img">
              </div>
              <div style="font-size:11px; color:#777; margin-bottom:4px;">${p.brand}</div>
              <span class="product-code">${p.code}</span>
              <div style='font-weight:bold; color:#005BAC; margin-bottom:5px; line-height:1.3;'>${p.name}</div>
              <div style='color:#d32f2f; font-weight:bold;'>¥${p.price.toLocaleString()}~</div>
            </td>`;
    });
    h += "</tr></thead><tbody>";

    // (以下、他のスペック行は前回と同じなので省略せずに記述します)
    h += "<tr><th class='label-col'>サイズ展開</th>";
    compareList.forEach(p => h += `<td class='product-col'><div class="spec-text" style="font-weight:bold;">${p.sizes}</div><div class="spec-sub">※カラーにより異なる</div></td>`);
    h += "</tr>";
    h += "<tr><th class='label-col'>カラー</th>";
    compareList.forEach(p => {
      let colors = p.colors.map(c => `<span class='swatch' style='background:${c}'></span>`).join("");
      h += `<td class='product-col'><div style="margin-bottom:4px;">${colors}</div><div class="spec-sub">全${p.colors.length + 10}色以上</div></td>`;
    });
    h += "</tr>";
    h += "<tr><th class='label-col'>厚み (オンス)</th>";
    compareList.forEach(p => h += `<td class='product-col'><div class="spec-text"><b>${p.oz} oz</b></div><div class='gauge-wrap'>薄 <div class='gauge-bg'><div class='gauge-val' style='width:${p.ozRate}%'></div></div> 厚</div></td>`);
    h += "</tr>";
    h += "<tr><th class='label-col'>生地・仕様</th>";
    compareList.forEach(p => h += `<td class='product-col'><div class="spec-text">${p.mat}</div><div style="margin-top:5px; border-top:1px dashed #eee; padding-top:5px;"><div class="spec-sub">編み地: ${p.weave}</div><div class="spec-sub">糸: ${p.yarn}</div></div></td>`);
    h += "</tr>";
    h += "<tr><th class='label-col'>シルエット・機能</th>";
    compareList.forEach(p => h += `<td class='product-col'><div class="spec-text" style="margin-bottom:5px;">${p.sil}</div><span class="spec-tag">${p.neck}</span><div class="spec-sub" style="margin-top:5px;">${p.feat}</div></td>`);
    h += "</tr>";
    h += "<tr><th class='label-col'></th>";
    compareList.forEach(p => h += `<td class='product-col'><button class='cart-btn'>商品ページへ</button></td>`);
    h += "</tr></tbody>";
    table.innerHTML = h;
  }

  // 初期表示
  addItem(1);
  addItem(3);
});
</script>
</body>
</html>
